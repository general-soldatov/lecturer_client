      text_data: Что называется элементарной работой силы?
      code_path: null
      image: null
      help: null
    answer:
      sample_size: null
      feedback:
        correct: ''
        wrong: ''
      correct:
      - 'Скалярная величина, равная скалярному произведению вектора силы на вектор
        элементарного перемещения: $dA = F·dr = F·ds·cos α$'
      wrong:
      - Произведение модуля силы на модуль перемещения
      - Произведение массы на ускорение
      - Векторная величина, равная $F × dr$
