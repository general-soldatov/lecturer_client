      text_data: В каких случаях работа силы положительна?
      code_path: null
      image: null
      help: null
    answer:
      sample_size: null
      feedback:
        correct: ''
        wrong: ''
      correct:
      - Когда угол между направлением силы и направлением перемещения острый ($0 ≤
        α < 90°$)
      wrong:
      - Когда угол $α = 90°$
      - Когда угол $α > 90°$
      - Когда сила перпендикулярна перемещению
