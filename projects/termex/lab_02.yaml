  - question:
      types: matching
      text_data: Сопоставьте тип корней характеристического уравнения с характером
        свободных колебаний (при наличии сопротивления).
      code_path: null
      image: null
      help: null
    answer:
      sample_size: null
      feedback:
        correct: ''
        wrong: ''
      first:
      - $n < k$ (малое затухание)
      - $n > k$ (большое затухание)
      - $n = k$ (критическое затухание)
      - $n = 0$ (отсутствие сопротивления)
      second:
