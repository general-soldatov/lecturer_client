  - question:
      types: choice
      text_data: В каком случае внутренние силы не совершают работы?
      code_path: null
      image: null
      help: null
    answer:
      sample_size: null
      feedback:
        correct: ''
        wrong: ''
      correct:
      - Для абсолютно твердого тела (расстояния между точками неизменны)
      - Для идеальных связей
      - Для систем, где внутренние силы консервативны
      wrong:
      - Всегда совершают работу
      - Никогда не совершают работу
      - Только при наличии трения
