      code_path: null
      image: null
      help: null
    answer:
      sample_size: null
      feedback:
        correct: ''
        wrong: ''
      correct:
      - $\frac{d}{dt} (\frac{∂T}{∂q̇_i}) - \frac{∂T}{∂q_i} = Q_i$
      wrong:
