      text_data: Что называется кинетической энергией механической системы?
      code_path: null
      image: null
      help: null
    answer:
      sample_size: null
      feedback:
        correct: ''
        wrong: ''
      correct:
      - $T = Σ (\frac{m_i·v_i²}{2})$'
      wrong:
      - $T = \frac{M·v_C²}{2}$
      - $T = \frac{I·ω²}{2}$
      - $T = Σ m_i·g·h_i$
